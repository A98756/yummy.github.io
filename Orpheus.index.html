<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Geometric Moths & Sonnets (Pure Local)</title>
    <style>
        /* ======================================================================
           G-CORE: ZERO-DEPENDENCY NATIVE CSS ENGINE
           ======================================================================
        */
        :root {
            --bg-color: #0a0a0c;
            --text-main: #e4e4e7;
            --text-muted: #a1a1aa;
            --text-dark: #71717a;
            --panel-bg: rgba(10, 10, 12, 0.4);
            /* 调用操作系统底层的原生高级字体，彻底戒断网络依赖 */
            --font-serif: "Palatino Linotype", "Book Antiqua", Palatino, Georgia, "Times New Roman", serif;
            --font-cursive: "Snell Roundhand", "Apple Chancery", "Brush Script MT", "Comic Sans MS", cursive;
            --font-zh: "Songti SC", "STSong", "Noto Serif CJK SC", "SimSun", serif;
            --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-muted);
            font-family: var(--font-serif);
            touch-action: none;
            transition: background-color 2s ease;
            -webkit-font-smoothing: antialiased;
        }

        /* 画布层 */
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 0; }

        /* UI 总控层 */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none; display: flex; justify-content: space-between;
        }

        /* 交互解锁 */
        .panel-interactive { pointer-events: auto; }

        /* 左侧控制面板 */
        #control-panel {
            position: absolute; left: 0; top: 0; height: 100%;
            width: 75vw; max-width: 20rem;
            background-color: var(--panel-bg);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-right: 1px solid rgba(255,255,255,0.05);
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            padding: 2rem 1rem 3rem 1.5rem;
            display: flex; flex-direction: column; gap: 0.5rem;
            transform: translateX(-100%);
            transition: transform 0.5s cubic-bezier(0.19, 1, 0.22, 1), background-color 2s ease;
            z-index: 20; overflow-y: auto;
            scrollbar-width: thin; scrollbar-color: #3f3f46 transparent;
        }
        #control-panel::-webkit-scrollbar { width: 3px; }
        #control-panel::-webkit-scrollbar-track { background: transparent; }
        #control-panel::-webkit-scrollbar-thumb { background-color: rgba(255, 255, 255, 0.2); border-radius: 4px; }

        @media (min-width: 768px) {
            #control-panel { max-width: 22rem; padding-left: 2rem; transform: translateX(0); }
        }

        /* 面板标题与头部 */
        .panel-header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid rgba(63,63,70,0.5); padding-bottom: 0.5rem; margin-bottom: 0.5rem; }
        .panel-title { font-size: 1.25rem; color: #d4d4d8; font-style: italic; transition: color 1s; }
        @media (min-width: 768px) { .panel-title { font-size: 1.5rem; } }
        .close-btn { background: none; border: none; color: #71717a; font-size: 1.25rem; cursor: pointer; padding: 0 0.5rem; }
        .close-btn:hover { color: #fff; }
        @media (min-width: 768px) { .close-btn { display: none; } }

        /* 状态信息 */
        .status-text { font-family: sans-serif; font-size: 0.6875rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 0.5rem; }
        .status-highlight { color: #e4e4e7; }
        .counter-box { display: block; margin-top: 0.75rem; border-top: 1px solid rgba(63,63,70,0.3); padding-top: 0.5rem; font-family: var(--font-mono); font-size: 0.75rem; color: #d4d4d8; letter-spacing: 0.05em; }

        /* 控件按钮体系 */
        .control-btn {
            font-family: var(--font-serif); letter-spacing: 0.05em; text-align: left;
            padding: 0.5rem 0.75rem; background: transparent; border: none;
            border-left: 2px solid transparent; color: var(--text-muted); cursor: pointer;
            transition: all 0.3s ease; display: block; width: 100%; border-radius: 0 4px 4px 0;
            line-height: 1.4; font-size: 1rem;
        }
        .control-btn:hover { background-color: rgba(255,255,255,0.05); transform: translateX(5px); color: #e4e4e7; }
        .btn-desc { display: block; font-size: 0.625rem; font-style: italic; margin-top: 0.1rem; opacity: 0.8; }
        @media (min-width: 768px) { .btn-desc { font-size: 0.75rem; } }
        .divider { height: 1px; background: rgba(63,63,70,0.8); margin: 0.75rem 0; transition: background 1s; }

        /* 特殊按钮颜色映射 */
        .btn-luna:hover { border-left-color: #a3cba6; } .desc-luna { color: #a3cba6; }
        .btn-atlas:hover { border-left-color: #f97316; } .desc-atlas { color: #f97316; }
        .btn-rosy:hover { border-left-color: #f472b6; } .desc-rosy { color: #f472b6; }
        .btn-deathshead:hover { border-left-color: #fbbf24; } .desc-deathshead { color: #fbbf24; }
        .btn-comet:hover { border-left-color: #fde047; } .desc-comet { color: #fde047; }
        .btn-cinnabar:hover { border-left-color: #ef4444; } .desc-cinnabar { color: #ef4444; }
        .btn-cyan:hover { border-left-color: #22d3ee; } .desc-cyan { color: #22d3ee; }
        .btn-orchid:hover { border-left-color: #d946ef; } .desc-orchid { color: #d946ef; }
        .btn-erase { color: #71717a; margin-top: 1rem; } .btn-erase:hover { border-left-color: #d4d4d8; color: #d4d4d8; }

        /* 接口控制区 */
        .api-section { margin-top: 1rem; border-top: 1px solid rgba(63,63,70,0.5); padding-top: 1.25rem; transition: border-color 1s; }
        .api-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
        .api-title { font-family: var(--font-mono); font-size: 0.625rem; color: #71717a; letter-spacing: 0.1em; text-transform: uppercase; }
        .settings-btn { background: none; border: none; color: #71717a; cursor: pointer; transition: color 0.3s; }
        .settings-btn:hover { color: #d4d4d8; }
        
        .input-field {
            width: 100%; background: rgba(0,0,0,0.5); border: 1px solid rgba(63,63,70,0.8);
            color: #e4e4e7; font-size: 0.875rem; padding: 0.5rem 0.75rem; margin-bottom: 0.75rem;
            border-radius: 2px; outline: none; transition: border-color 0.3s; font-family: sans-serif;
        }
        .input-field:focus { border-color: #d4d4d8; }
        .input-field::placeholder { color: #52525b; }

        .btn-llm { padding-top: 0.625rem; padding-bottom: 0.625rem; margin-bottom: 0.5rem; }
        .btn-llm:hover { border-left-color: #fff; background-color: rgba(255,255,255,0.05); }
        .btn-babel { margin-top: 1rem; }
        .btn-babel:hover { border-left-color: #f43f5e; background-color: rgba(244,63,94,0.05); }
        
        #llm-status { font-family: var(--font-mono); font-size: 0.625rem; color: #a3cba6; margin-top: 0.75rem; height: 1rem; transition: opacity 0.3s; }
        .hidden { opacity: 0; pointer-events: none; }

        /* 移动端打开把手 */
        #panel-toggle {
            display: flex; position: absolute; left: 0; top: 33%; z-index: 10;
            background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1); border-left: none;
            color: #a1a1aa; font-size: 0.75rem; padding: 1.5rem 0.25rem; border-radius: 0 6px 6px 0;
            cursor: pointer; writing-mode: vertical-rl; text-orientation: mixed; align-items: center; justify-content: center;
            pointer-events: auto; transition: opacity 0.3s, background 0.3s; box-shadow: 2px 0 10px rgba(0,0,0,0.3);
        }
        #panel-toggle:hover { background: rgba(255,255,255,0.1); color: #fff; }
        @media (min-width: 768px) { #panel-toggle { display: none; } }

        /* 右侧展示区 */
        #poem-container {
            position: absolute; right: 1.5rem; top: 4rem; width: 85vw; max-height: 75vh;
            display: flex; flex-direction: column; text-align: right; z-index: 0;
            padding-bottom: 3rem; overflow-y: auto; pointer-events: auto;
            scrollbar-width: none; -ms-overflow-style: none; -webkit-overflow-scrolling: touch;
        }
        #poem-container::-webkit-scrollbar { display: none; }
        @media (min-width: 768px) {
            #poem-container { right: 6rem; top: 50%; transform: translateY(-50%); width: 40vw; max-height: 80vh; }
        }

        /* 动态文本物理引擎画布 */
        @keyframes textBreathe {
            0%, 100% { filter: drop-shadow(0 0 10px currentColor); opacity: 0.85; }
            50% { filter: drop-shadow(0 0 20px currentColor) drop-shadow(0 0 30px currentColor); opacity: 1; }
        }
        #poem-canvas {
            position: relative; width: 100%; min-height: 200px;
            font-size: 2rem; color: #e4e4e7; letter-spacing: 0.05em;
            animation: textBreathe 6s ease-in-out infinite; transition: color 2s ease;
        }
        @media (min-width: 768px) { #poem-canvas { font-size: 3rem; } }

        .char {
            position: absolute; font-family: var(--font-cursive); transition: color 2s ease, opacity 1s ease;
            cursor: default; user-select: none; will-change: transform, opacity; line-height: 1;
        }
        .char.restoring { transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.5s ease, color 2s ease; }

        /* 署名与翻译 */
        #poem-author {
            font-family: var(--font-serif); font-size: 0.75rem; color: #71717a; text-transform: uppercase;
            letter-spacing: 0.1em; border-top: 1px solid rgba(63,63,70,0.8); padding-top: 0.75rem; margin-top: 1rem;
            align-self: flex-end; transition: color 2s ease, border-color 2s ease, opacity 1s ease;
        }
        @media (min-width: 768px) { #poem-author { font-size: 0.875rem; } }
        
        #poem-translation {
            font-family: var(--font-zh); font-size: 0.65rem; color: rgba(82,82,91,0.8);
            letter-spacing: 0.1em; line-height: 1.8; margin-top: 0.5rem; transition: color 2s ease, opacity 1s ease;
        }
        @media (min-width: 768px) { #poem-translation { font-size: 0.75rem; margin-top: 0.75rem; } }

        /* 巴别塔特殊状态 */
        .babel-active { color: #f43f5e !important; border-left-color: rgba(244, 63, 94, 0.5) !important; text-shadow: 0 0 8px rgba(244, 63, 94, 0.5); }
        
        /* 模态框配置面板 */
        #settings-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 50; justify-content: center; align-items: center;
            pointer-events: auto; backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
        }
        .modal-content {
            background: #18181b; border: 1px solid #3f3f46; padding: 2rem; border-radius: 8px;
            width: 90%; max-width: 400px; font-family: sans-serif; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .modal-title { font-size: 1.25rem; color: #e4e4e7; margin-bottom: 1rem; border-bottom: 1px solid #3f3f46; padding-bottom: 0.5rem; font-family: var(--font-serif); font-style: italic; }
        .modal-label { display: block; font-size: 0.75rem; color: #a1a1aa; margin-bottom: 0.25rem; font-family: var(--font-mono); }
        .modal-input { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid #3f3f46; color: #d4d4d8; font-size: 0.875rem; padding: 0.5rem 0.75rem; margin-bottom: 1rem; border-radius: 4px; outline: none; }
        .modal-input:focus { border-color: #71717a; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 0.75rem; margin-top: 0.5rem; }
        .btn-cancel { background: none; border: none; color: #a1a1aa; font-size: 0.875rem; cursor: pointer; padding: 0.5rem 1rem; }
        .btn-cancel:hover { color: #fff; }
        .btn-save { background: #27272a; border: 1px solid #3f3f46; color: #e4e4e7; font-size: 0.875rem; cursor: pointer; padding: 0.5rem 1rem; border-radius: 4px; transition: background 0.3s; }
        .btn-save:hover { background: #3f3f46; }
    </style>
</head>
<body id="main-body">

    <canvas id="mothCanvas"></canvas>

    <div id="ui-layer">
        
        <div id="control-panel" class="panel-interactive">
            
            <div class="panel-header">

                <button onclick="togglePanel()" class="close-btn">✕</button>
            </div>

            <p class="status-text">
                Build: Local Standalone v1.1<br>
                Acoustics: <span class="status-highlight">Brownian Noise Floor</span><br>

                <span class="counter-box">Active Entities: <span id="moth-counter" style="color:#fff;">0</span></span>

            <div id="poem-translation">
                当合上双眼，我才看的最清，<br>

    <!-- 配置模态框 -->
    <div id="settings-modal">
        <div class="modal-content">
            <h2 class="modal-title">System Settings / LLM</h2>
            
            <label class="modal-label">API Base URL</label>
            <input id="api-url" type="text" class="modal-input" placeholder="e.g., https://api.deepseek.com/v1/chat/completions">
            
            <label class="modal-label">API Key</label>
            <input id="api-key" type="password" class="modal-input" placeholder="sk-...">

            <div class="modal-actions">

                <button onclick="saveSettings()" class="btn-save">Save locally</button>
            </div>

    <script>
        // --- 本地配置管理 ---
        const cfgKeys = { url: 'moth_api_url', key: 'moth_api_key', model: 'moth_api_model' };
        
        function getConfigs() {
            return {
                url: localStorage.getItem(cfgKeys.url) || '',
                key: localStorage.getItem(cfgKeys.key) || '',
                model: localStorage.getItem(cfgKeys.model) || ''
            };
        }

        function openSettings() {
            const cfg = getConfigs();
            document.getElementById('api-url').value = cfg.url;
            document.getElementById('api-key').value = cfg.key;
            document.getElementById('api-model').value = cfg.model;
            document.getElementById('settings-modal').style.display = 'flex';
        }

        function closeSettings() { document.getElementById('settings-modal').style.display = 'none'; }

        function saveSettings() {
            localStorage.setItem(cfgKeys.url, document.getElementById('api-url').value.trim());
            localStorage.setItem(cfgKeys.key, document.getElementById('api-key').value.trim());
            localStorage.setItem(cfgKeys.model, document.getElementById('api-model').value.trim());
            closeSettings();
        }

        // --- Web Audio 引擎 ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx, ambientSource, ambientFilter, ambientGain, spaceLfo, spaceLfoGain; 
        const pentatonicHigh = [440.00, 523.25, 587.33, 659.25, 783.99, 880.00, 1046.50];

        function initAudio() {
            if (!audioCtx) { audioCtx = new AudioContext(); setupAmbientFloor(); }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function createBrownianNoiseBuffer() {
            const bufferSize = audioCtx.sampleRate * 5; 
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0); let lastOut = 0;
            for (let i = 0; i < bufferSize; i++) {
                const white = Math.random() * 2 - 1; lastOut = (lastOut + (0.02 * white)) / 1.02; data[i] = lastOut * 3.5; 
            } return buffer;
        }

        function setupAmbientFloor() {
            const noise = audioCtx.createBufferSource(); noise.buffer = createBrownianNoiseBuffer(); noise.loop = true;
            ambientFilter = audioCtx.createBiquadFilter(); ambientGain = audioCtx.createGain();
            
            spaceLfo = audioCtx.createOscillator(); spaceLfo.type = 'sine'; spaceLfo.frequency.value = 0.05; 
            spaceLfoGain = audioCtx.createGain(); spaceLfoGain.gain.value = 0; 
            spaceLfo.connect(spaceLfoGain); spaceLfoGain.connect(ambientFilter.frequency); spaceLfo.start();

            ambientFilter.type = 'lowpass'; ambientFilter.frequency.value = 250;
            spaceLfoGain.gain.value = 100; ambientGain.gain.value = 0.08; 

            noise.connect(ambientFilter); ambientFilter.connect(ambientGain); ambientGain.connect(audioCtx.destination);
            noise.start(); ambientSource = noise;
        }

        function updateAcousticFloor(season) {
            if (!audioCtx) return; const now = audioCtx.currentTime;
            spaceLfoGain.gain.cancelScheduledValues(now); spaceLfoGain.gain.setValueAtTime(0, now);
            ambientGain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);

            setTimeout(() => {
                switch(season) {
                    case 'Summer':

            const counterEl = document.getElementById('moth-counter'); if(counterEl) { counterEl.innerText=moths.length; counterEl.style.color = moths.length>50 ? "#a3cba6" : "#ffffff"; }
        };

        window.clearMoths = function() { playKeyClick(); moths = []; const counterEl = document.getElementById('moth-counter'); if(counterEl) { counterEl.innerText = moths.length; counterEl.style.color = "#ffffff"; } ctx.clearRect(0, 0, width, height); };

        // --- 通用 LLM 适配器 ---
        async function fetchLLMWithBackoff(payload) {
            const cfg = getConfigs();
            if (!cfg.url || !cfg.key || !cfg.model) { openSettings(); throw new Error("Missing API Configuration"); }
            
            const promptText = payload.contents[0].parts[0].text;
            const openAIPayload = {
                model: cfg.model,
                messages: [ { role: "system", content: "You are a helpful assistant. Output valid JSON only." }, { role: "user", content: promptText } ],
                response_format: { type: "json_object" }
            };

            const response = await fetch(cfg.url, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${cfg.key}` }, body: JSON.stringify(openAIPayload) });
            if (!response.ok) { if (response.status === 401) { openSettings(); throw new Error("Invalid API Key"); } throw new Error(`API Error: ${response.status}`); }
            
            const data = await response.json(); const contentText = data.choices[0].message.content;
            try { return JSON.parse(contentText); } catch (e) { throw new Error("Model did not return valid JSON."); }
        }

        window.synthesizeMoth = async function() {
            playKeyClick();
            const input = document.getElementById('mood-input').value || "微弱的混乱";
            const statusEl = document.getElementById('llm-status'); statusEl.innerText = "算力接入中..."; statusEl.style.opacity = '1';
            try {
                const prompt = `分析情绪：“${input}”。转为虚拟飞蛾参数。严格返回以下 JSON 格式：\n{"id": "string (英文小写)", "name": "string (名字)", "bodyColor": "string (hex)", "c1": "string (hex)", "c2": "string (hex)", "accent": "string (hex)", "flapSpeed": number (0.05-0.9), "mass": number (0.2-2.5)}`;
                const data = await fetchLLMWithBackoff({ contents: [{ parts: [{ text: prompt }] }] });
                speciesData[data.id] = { bodyColor: data.bodyColor, colors: [data.c1, data.c2, data.accent], baseAlpha: 0.7, scale: 0.8+(data.mass*0.3), mass: data.mass, flapSpeed: data.flapSpeed, geometry: speciesData['luna'].geometry, flightBehavior: function(m, t) { m.vx+=(Math.random()-0.5)*data.flapSpeed; m.vy+=(Math.random()-0.5)*data.flapSpeed; } };
                spawnMoth(data.id); document.getElementById('mood-input').value = ""; statusEl.innerText = `已重构: ${data.name}`;
            } catch (e) { statusEl.innerText = e.message === "Missing API Configuration" ? "请先配置 API" : "接口调用失败"; }
            setTimeout(() => statusEl.style.opacity = '0', 3000);
        };

        window.rewritePoem = async function() {
            playKeyClick();
            const statusEl = document.getElementById('llm-status'); statusEl.innerText = "重新计算坐标系..."; statusEl.style.opacity = '1';
            textParticles.forEach(p => p.element.style.opacity = 0); poemAuthor.style.opacity = 0; poemTranslation.style.opacity = 0;
            try {
                const prompt = `写一首4-6行的英文诗，关于混乱、距离或重构。十四行诗风格。严格返回以下 JSON 格式：\n{"poemLines": ["第1行", "第2行"], "author": "作者名字", "translation": "对应的中文翻译，使用 <br> 换行"}`;
                const data = await fetchLLMWithBackoff({ contents: [{ parts: [{ text: prompt }] }] });
                setTimeout(() => {
                    initTextPhysics(data.poemLines); poemAuthor.innerText = data.author; poemTranslation.innerHTML = data.translation;
                    poemAuthor.style.opacity = 1; poemTranslation.style.opacity = 1; calculateGravity();
                }, 1000);
            } catch (e) { 
                textParticles.forEach(p => p.element.style.opacity = 1); poemAuthor.style.opacity = 1; poemTranslation.style.opacity = 1; 
                statusEl.innerText = e.message === "Missing API Configuration" ? "请先配置 API" : "重写失败";
            }
            setTimeout(() => statusEl.style.opacity = '0', 3000);
        };

        // --- Init & Loop ---
        resize(); initEnvParticles('Summer'); 
        setTimeout(() => { initTextPhysics(defaultPoem); spawnMoth('luna'); }, 500);

        function animate(time) {
            const currentCfg = envConfig[seasons[currentSeasonIndex]];
            ctx.globalCompositeOperation = 'source-over'; ctx.fillStyle = currentCfg.clearColor; ctx.fillRect(0, 0, width, height);
            drawEnvironment(time);
            ctx.globalCompositeOperation = 'lighter'; for (let i = 0; i < moths.length; i++) { moths[i].update(time); moths[i].draw(ctx, time); }
            if(textParticles.length > 0) updateTextPhysics();
            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);
    </script>
</body>
</html>
